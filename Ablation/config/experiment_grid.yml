############################################################
# config.yml
# Grid config for binary and categorical MMIL / MCEM ablation experiments.
############################################################

project:
  proj_dir: "."
  in_dir: "Input"
  out_dir: "Output"

  expr_file: "GSE131907_pilot_expression_subset_dt.rds"
  meta_file: "GSE131907_pilot_sampled_cell_metadata_with_clinical.csv"

defaults:
  test_fraction: 0.25

  min_cell_fraction: 0.01
  n_hvg: 2000
  scale_factor: 10000

  nmf_method: "brunet"
  nmf_nrun: 1

  rho: 0.70
  label_strength: 0.70

  max_iter: 30
  tol: 0.0001
  mcem_samples: 30

  save_plots: true

tasks:
  - task_type: "binary"

  - task_type: "categorical"
    categorical_scheme: "three_stage"

  # - task_type: "categorical"
  #   categorical_scheme: "four_stage"

features:
  methods:
    - PCA
    - ICA
    - NMF

  n_components:
    - 10
    - 20
    - 50

models:
  - model_name: "glmnet_ridge"
    backend: "glmnet"
    glmnet_alpha: 0
    lambda_choice: "lambda.min"
    reuse_lambda: true
    nfolds: 5
    type_measure: "deviance"
    standardize: true
    maxit: 1000000

  - model_name: "glmnet_elasticnet"
    backend: "glmnet"
    glmnet_alpha: 0.5
    lambda_choice: "lambda.min"
    reuse_lambda: true
    nfolds: 5
    type_measure: "deviance"
    standardize: true
    maxit: 1000000

  - model_name: "glmnet_lasso"
    backend: "glmnet"
    glmnet_alpha: 1
    lambda_choice: "lambda.min"
    reuse_lambda: true
    nfolds: 5
    type_measure: "deviance"
    standardize: true
    maxit: 1000000

  - model_name: "xgboost"
    backend: "xgboost"
    eta: 0.05
    max_depth: 3
    min_child_weight: 1
    subsample: 0.8
    colsample_bytree: 0.8
    xgb_lambda: 1
    xgb_alpha: 0
    nrounds: 100
    nthread: 2
    verbose: 0

seeds:
  - 2026